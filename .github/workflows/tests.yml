name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quick-tests:
    name: PR/Push quick suite (exclude slow)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: [self-hosted, primary]
    timeout-minutes: 60
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify preinstalled host build dependencies
        run: |
          set -euo pipefail
          for tool in cmake ninja ctest python3 pkg-config gcc g++; do
            command -v "$tool" >/dev/null 2>&1 || { echo "Missing required tool: $tool" >&2; exit 1; }
          done

      - name: Resolve preinstalled host Qt 6
        run: |
          set -euo pipefail
          QT6_CMAKE_DIR=""
          if [ -n "${QT_ROOT:-}" ]; then
            if [ -d "$QT_ROOT/lib/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib/cmake/Qt6"
            elif [ -d "$QT_ROOT/lib64/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib64/cmake/Qt6"
            else
              echo "QT_ROOT is set but Qt6 CMake package was not found under $QT_ROOT." >&2
              exit 1
            fi
          else
            QT6_CONFIG_FILE="$(find /opt/Qt /usr/lib64 /usr/lib -type f -path '*/cmake/Qt6/Qt6Config.cmake' 2>/dev/null | sort | head -n 1 || true)"
            if [ -z "$QT6_CONFIG_FILE" ]; then
              echo "Failed to locate Qt6Config.cmake on runner. Install Qt6 development packages or set QT_ROOT." >&2
              exit 1
            fi
            QT6_CMAKE_DIR="$(dirname "$QT6_CONFIG_FILE")"
          fi

          QT_ROOT="$(cd "$QT6_CMAKE_DIR/../../.." && pwd)"
          if [ ! -d "$QT6_CMAKE_DIR" ]; then
            echo "Resolved Qt6 CMake directory is invalid: $QT6_CMAKE_DIR" >&2
            exit 1
          fi
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "QT6_CMAKE_DIR=$QT6_CMAKE_DIR" >> "$GITHUB_ENV"
          echo "$QT_ROOT/bin" >> "$GITHUB_PATH"

      - name: Configure CMake
        run: |
          CCACHE_DISABLE=1 cmake -S . -B cmake-build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DQt6_DIR="$QT6_CMAKE_DIR" \
            -DQMUD_ENABLE_TESTING=ON \
            -DQMUD_ENABLE_GUI_TESTS=ON

      - name: Build
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release -j 6

      - name: Run quick test suite
        run: |
          ctest --test-dir cmake-build-release --output-on-failure --label-exclude slow

      - name: Upload CTest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-quick
          if-no-files-found: ignore
          path: |
            cmake-build-release/Testing/Temporary/*
            cmake-build-release/Testing/**/*.xml

      - name: Upload failing test executables
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qtest-binaries-quick
          if-no-files-found: ignore
          path: |
            cmake-build-release/tests/tst_*

  full-tests:
    name: Scheduled/manual full suite
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, primary]
    timeout-minutes: 90
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify preinstalled host build dependencies
        run: |
          set -euo pipefail
          for tool in cmake ninja ctest python3 pkg-config gcc g++; do
            command -v "$tool" >/dev/null 2>&1 || { echo "Missing required tool: $tool" >&2; exit 1; }
          done

      - name: Resolve preinstalled host Qt 6
        run: |
          set -euo pipefail
          QT6_CMAKE_DIR=""
          if [ -n "${QT_ROOT:-}" ]; then
            if [ -d "$QT_ROOT/lib/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib/cmake/Qt6"
            elif [ -d "$QT_ROOT/lib64/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib64/cmake/Qt6"
            else
              echo "QT_ROOT is set but Qt6 CMake package was not found under $QT_ROOT." >&2
              exit 1
            fi
          else
            QT6_CONFIG_FILE="$(find /opt/Qt /usr/lib64 /usr/lib -type f -path '*/cmake/Qt6/Qt6Config.cmake' 2>/dev/null | sort | head -n 1 || true)"
            if [ -z "$QT6_CONFIG_FILE" ]; then
              echo "Failed to locate Qt6Config.cmake on runner. Install Qt6 development packages or set QT_ROOT." >&2
              exit 1
            fi
            QT6_CMAKE_DIR="$(dirname "$QT6_CONFIG_FILE")"
          fi

          QT_ROOT="$(cd "$QT6_CMAKE_DIR/../../.." && pwd)"
          if [ ! -d "$QT6_CMAKE_DIR" ]; then
            echo "Resolved Qt6 CMake directory is invalid: $QT6_CMAKE_DIR" >&2
            exit 1
          fi
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "QT6_CMAKE_DIR=$QT6_CMAKE_DIR" >> "$GITHUB_ENV"
          echo "$QT_ROOT/bin" >> "$GITHUB_PATH"

      - name: Configure CMake
        run: |
          CCACHE_DISABLE=1 cmake -S . -B cmake-build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DQt6_DIR="$QT6_CMAKE_DIR" \
            -DQMUD_ENABLE_TESTING=ON \
            -DQMUD_ENABLE_GUI_TESTS=ON

      - name: Build
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release -j 6

      - name: Run full test suite
        run: |
          ctest --test-dir cmake-build-release --output-on-failure

      - name: Upload CTest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-full
          if-no-files-found: ignore
          path: |
            cmake-build-release/Testing/Temporary/*
            cmake-build-release/Testing/**/*.xml

      - name: Upload failing test executables
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qtest-binaries-full
          if-no-files-found: ignore
          path: |
            cmake-build-release/tests/tst_*

  coverage:
    name: Manual coverage (llvm/gcov)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, primary]
    timeout-minutes: 120
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify preinstalled host build dependencies
        run: |
          set -euo pipefail
          for tool in cmake ninja ctest python3 pkg-config gcc g++ lcov genhtml; do
            command -v "$tool" >/dev/null 2>&1 || { echo "Missing required tool: $tool" >&2; exit 1; }
          done

      - name: Resolve preinstalled host Qt 6
        run: |
          set -euo pipefail
          QT6_CMAKE_DIR=""
          if [ -n "${QT_ROOT:-}" ]; then
            if [ -d "$QT_ROOT/lib/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib/cmake/Qt6"
            elif [ -d "$QT_ROOT/lib64/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib64/cmake/Qt6"
            else
              echo "QT_ROOT is set but Qt6 CMake package was not found under $QT_ROOT." >&2
              exit 1
            fi
          else
            QT6_CONFIG_FILE="$(find /opt/Qt /usr/lib64 /usr/lib -type f -path '*/cmake/Qt6/Qt6Config.cmake' 2>/dev/null | sort | head -n 1 || true)"
            if [ -z "$QT6_CONFIG_FILE" ]; then
              echo "Failed to locate Qt6Config.cmake on runner. Install Qt6 development packages or set QT_ROOT." >&2
              exit 1
            fi
            QT6_CMAKE_DIR="$(dirname "$QT6_CONFIG_FILE")"
          fi

          QT_ROOT="$(cd "$QT6_CMAKE_DIR/../../.." && pwd)"
          if [ ! -d "$QT6_CMAKE_DIR" ]; then
            echo "Resolved Qt6 CMake directory is invalid: $QT6_CMAKE_DIR" >&2
            exit 1
          fi
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "QT6_CMAKE_DIR=$QT6_CMAKE_DIR" >> "$GITHUB_ENV"
          echo "$QT_ROOT/bin" >> "$GITHUB_PATH"

      - name: Configure CMake (coverage)
        run: |
          CCACHE_DISABLE=1 cmake -S . -B cmake-build-coverage -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DQt6_DIR="$QT6_CMAKE_DIR" \
            -DQMUD_ENABLE_TESTING=ON \
            -DQMUD_ENABLE_GUI_TESTS=ON \
            -DCMAKE_C_FLAGS="--coverage" \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-coverage -j 6

      - name: Run tests for coverage
        run: |
          ctest --test-dir cmake-build-coverage --output-on-failure --label-exclude slow

      - name: Generate coverage report
        run: |
          lcov --capture --directory cmake-build-coverage --output-file coverage.info
          lcov --remove coverage.info '/usr/*' "$RUNNER_TEMP/*" --output-file coverage.filtered.info
          genhtml coverage.filtered.info --output-directory coverage-html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qmud-coverage
          if-no-files-found: error
          path: |
            coverage.filtered.info
            coverage-html/**
