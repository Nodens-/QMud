            cmake-build-release/appimage-docker-out/*.AppImage.zsync

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmud-macos
          if-no-files-found: error
          path: |
            cmake-build-release/mac-docker-out/QMud-*.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmud-windows
          if-no-files-found: error
          path: |
            cmake-build-release/windows-docker-out/QMud-*.zip
            cmake-build-release/windows-docker-out/QMud-*.exe

  publish-release:
    name: Publish GitHub release assets
    needs: build-packages-tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, primary]
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qmud-*
          path: release-assets

      - name: Build release changelog body
        id: release_changelog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-v:refname --list 'v*' | awk -v cur="${CURRENT_TAG}" '$0 != cur {print; exit}')"
          RANGE="${CURRENT_TAG}^!"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi
          export RANGE
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.request

          range_spec = os.environ.get("RANGE", "").strip()
          repo = os.environ["GITHUB_REPOSITORY"]
          api_base = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
          token = os.environ.get("GITHUB_TOKEN", "").strip()
          output_path = "release-notes.md"

          def split_sentences(text: str) -> list[str]:
              collapsed = " ".join(text.split())
              if not collapsed:
                  return []
              return [part.strip() for part in re.split(r"(?<=\\.)\\s+", collapsed) if part.strip()]

          commit_pr_cache: dict[str, list[dict]] = {}

          def fetch_commit_prs(sha: str) -> list[dict]:
              if sha in commit_pr_cache:
                  return commit_pr_cache[sha]
              url = f"{api_base}/repos/{repo}/commits/{sha}/pulls"
              headers = {
                  "Accept": "application/vnd.github+json, application/vnd.github.groot-preview+json",
                  "User-Agent": "qmud-release-notes",
              }
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
              except (urllib.error.URLError, urllib.error.HTTPError, TimeoutError, json.JSONDecodeError):
                  payload = []
              prs = payload if isinstance(payload, list) else []
              commit_pr_cache[sha] = prs
              return prs

          raw = subprocess.check_output(
              ["git", "rev-list", "--first-parent", "--reverse", range_spec],
              text=True,
              encoding="utf-8",
              errors="replace",
          )
          commits = [line.strip() for line in raw.splitlines() if line.strip()]

          lines = ["## What's changed", ""]
          seen_prs: set[str] = set()
          if commits:
              for sha in commits:
                  prs = fetch_commit_prs(sha)
                  if not prs:
                      continue
                  for pr_payload in prs:
                      if not isinstance(pr_payload, dict):
                          continue
                      number = pr_payload.get("number")
                      if number is None:
                          continue
                      pr_number = str(number).strip()
                      if not pr_number or pr_number in seen_prs:
                          continue
                      seen_prs.add(pr_number)

                      source_text = str(pr_payload.get("title", "")).strip()
                      if not source_text:
                          source_text = "Untitled PR."
                      sentences = split_sentences(source_text)
                      if not sentences:
                          sentences = [source_text]

                      login = ""
                      user = pr_payload.get("user")
                      if isinstance(user, dict):
                          login = str(user.get("login", "")).strip()

                      for sentence in sentences:
                          if login:
                              lines.append(f"* {sentence} by @{login} (#{pr_number})")
                          else:
                              lines.append(f"* {sentence} (#{pr_number})")

          if len(lines) == 2:
              lines.append("* No merged pull requests found in selected range.")

          with open(output_path, "w", encoding="utf-8") as fh:
              fh.write("\n".join(lines).rstrip() + "\n")
          PY
          echo "body_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: ${{ steps.release_changelog.outputs.body_path }}
          files: |
            release-assets/qmud-appimage/*.AppImage
            release-assets/qmud-appimage/*.AppImage.zsync
            release-assets/qmud-macos/*.zip
            release-assets/qmud-windows/*.zip
            release-assets/qmud-windows/*.exe

  publish-ci-release:
    name: Publish rolling CI prerelease
    needs: build-packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, primary]
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base version from Version.h
        id: version
        run: |
          VERSION_LINE="$(grep -F -m1 'kVersionString[]' src/Version.h || true)"
          BASE_VERSION="${VERSION_LINE#*\"}"
          BASE_VERSION="${BASE_VERSION%%\"*}"
          if [ -z "$BASE_VERSION" ]; then
            echo "Failed to resolve kVersionString from src/Version.h" >&2
            exit 1
          fi
          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qmud-*
          path: release-assets

      - name: Move rolling CI tag to current commit
        run: |
          CI_TAG="ci-${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${CI_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${CI_TAG}" --force

      - name: Build CI changelog body
        id: changelog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PREVIOUS_TAG="$(git tag --sort=-v:refname --list 'v*' | head -n 1)"
          RANGE="${GITHUB_SHA}^!"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${GITHUB_SHA}"
          fi
          export RANGE
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.request

          range_spec = os.environ.get("RANGE", "").strip()
          repo = os.environ["GITHUB_REPOSITORY"]
          api_base = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
          token = os.environ.get("GITHUB_TOKEN", "").strip()
          output_path = "ci-release-notes.md"

          def split_sentences(text: str) -> list[str]:
              collapsed = " ".join(text.split())
              if not collapsed:
                  return []
              return [part.strip() for part in re.split(r"(?<=\\.)\\s+", collapsed) if part.strip()]

          commit_pr_cache: dict[str, list[dict]] = {}

          def fetch_commit_prs(sha: str) -> list[dict]:
              if sha in commit_pr_cache:
                  return commit_pr_cache[sha]
              url = f"{api_base}/repos/{repo}/commits/{sha}/pulls"
              headers = {
                  "Accept": "application/vnd.github+json, application/vnd.github.groot-preview+json",
                  "User-Agent": "qmud-release-notes",
              }
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
              except (urllib.error.URLError, urllib.error.HTTPError, TimeoutError, json.JSONDecodeError):
                  payload = []
              prs = payload if isinstance(payload, list) else []
              commit_pr_cache[sha] = prs
              return prs

          raw = subprocess.check_output(
              ["git", "rev-list", "--first-parent", "--reverse", range_spec],
              text=True,
              encoding="utf-8",
              errors="replace",
          )
          commits = [line.strip() for line in raw.splitlines() if line.strip()]

          lines = ["## What's changed", ""]
          seen_prs: set[str] = set()
          if commits:
              for sha in commits:
                  prs = fetch_commit_prs(sha)
                  if not prs:
                      continue
                  for pr_payload in prs:
                      if not isinstance(pr_payload, dict):
                          continue
                      number = pr_payload.get("number")
                      if number is None:
                          continue
                      pr_number = str(number).strip()
                      if not pr_number or pr_number in seen_prs:
                          continue
                      seen_prs.add(pr_number)

                      source_text = str(pr_payload.get("title", "")).strip()
                      if not source_text:
                          source_text = "Untitled PR."
                      sentences = split_sentences(source_text)
                      if not sentences:
                          sentences = [source_text]

                      login = ""
                      user = pr_payload.get("user")
                      if isinstance(user, dict):
                          login = str(user.get("login", "")).strip()

                      for sentence in sentences:
                          if login:
                              lines.append(f"* {sentence} by @{login} (#{pr_number})")
                          else:
                              lines.append(f"* {sentence} (#{pr_number})")

          if len(lines) == 2:
              lines.append("* No merged pull requests found in selected range.")

          with open(output_path, "w", encoding="utf-8") as fh:
              fh.write("\n".join(lines).rstrip() + "\n")
          PY
          echo "body_path=ci-release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Remove old CI release assets
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = `ci-${context.ref.replace('refs/heads/', '')}`;
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release for tag ${tag}; skipping cleanup.`);
                return;
              }
              throw error;
            }

            const assets = release.data.assets || [];
            for (const asset of assets) {
              core.info(`Deleting old CI asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id,
              });
            }

      - name: Publish CI prerelease assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.ref_name }}
          name: QMud v${{ steps.version.outputs.base }}-ci
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body_path: ${{ steps.changelog.outputs.body_path }}
          overwrite_files: true
          files: |
            release-assets/qmud-appimage/*.AppImage
            release-assets/qmud-appimage/*.AppImage.zsync
            release-assets/qmud-macos/*.zip
            release-assets/qmud-windows/*.zip
            release-assets/qmud-windows/*.exe
