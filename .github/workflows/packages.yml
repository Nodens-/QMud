name: Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-packages:
    name: Build AppImage / macOS / Windows packages
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve package version metadata
        run: |
          set -euo pipefail

          VERSION_LINE="$(grep -F -m1 'kVersionString[]' src/Version.h || true)"
          BASE_VERSION="${VERSION_LINE#*\"}"
          BASE_VERSION="${BASE_VERSION%%\"*}"
          if [ -z "$BASE_VERSION" ]; then
            echo "Failed to resolve kVersionString from src/Version.h" >&2
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            PACKAGE_VERSION="$BASE_VERSION"
          else
            PACKAGE_VERSION="ci-${SHORT_SHA}"
          fi

          echo "QMUD_BASE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "QMUD_PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Free runner disk space for Docker builds
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            lua-json \
            lua-lpeg \
            lua-socket \
            lua5.4 \
            libgl1-mesa-dev \
            libpulse0 \
            liblua5.4-dev \
            ninja-build \
            patchelf \
            pkg-config \
            python3-pip

      - name: Resolve Lua module shared objects
        run: |
          set -euo pipefail

          find_first() {
            local pattern="$1"
            shift
            for root in "$@"; do
              [ -n "$root" ] || continue
              [ -d "$root" ] || continue
              local found
              found="$(find "$root" -type f -path "$pattern" | sort | head -n 1)"
              if [ -n "$found" ]; then
                printf '%s\n' "$found"
                return 0
              fi
            done
            return 1
          }

          LUA_BIN=""
          if command -v lua5.4 >/dev/null 2>&1; then
            LUA_BIN="lua5.4"
          elif command -v lua >/dev/null 2>&1; then
            LUA_BIN="lua"
          fi

          lua_find_module() {
            local module="$1"
            [ -n "$LUA_BIN" ] || return 0
            "$LUA_BIN" -e "local p = package.searchpath('${module}', package.cpath); if p then io.write(p) end" 2>/dev/null || true
          }

          LPEG_SO="$(lua_find_module 'lpeg')"
          SOCKET_CORE_SO="$(lua_find_module 'socket.core')"
          MIME_CORE_SO="$(lua_find_module 'mime.core')"

          MULTIARCH_ROOT="/usr/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || true)"
          SEARCH_ROOTS=(
            "$MULTIARCH_ROOT"
            /usr/lib
            /usr/lib64
            /usr/local/lib
            /usr/local/lib64
          )

          if [ -n "$LUA_BIN" ]; then
            LUA_CPATH="$("$LUA_BIN" -e 'io.write(package.cpath)' 2>/dev/null || true)"
            while IFS=';' read -r entry; do
              [ -n "$entry" ] || continue
              root="$(printf '%s\n' "$entry" | sed -E 's#/\?/core\.so$##; s#/\?\.so$##')"
              [ -d "$root" ] || continue
              SEARCH_ROOTS+=("$root")
            done < <(printf '%s' "$LUA_CPATH")
          fi

          if [ -z "$LPEG_SO" ]; then
            LPEG_SO="$(find_first '*/lua/*/lpeg.so' "${SEARCH_ROOTS[@]}" || true)"
          fi
          if [ -z "$SOCKET_CORE_SO" ]; then
            SOCKET_CORE_SO="$(find_first '*/lua/*/socket/core.so' "${SEARCH_ROOTS[@]}" || true)"
          fi
          if [ -z "$MIME_CORE_SO" ]; then
            MIME_CORE_SO="$(find_first '*/lua/*/mime/core.so' "${SEARCH_ROOTS[@]}" || true)"
          fi

          if [ -z "$LPEG_SO" ] && dpkg -s lua-lpeg >/dev/null 2>&1; then
            LPEG_SO="$(dpkg -L lua-lpeg | grep -E '/lua/.*/lpeg\.so$' | head -n 1 || true)"
          fi
          if [ -z "$SOCKET_CORE_SO" ] && dpkg -s lua-socket >/dev/null 2>&1; then
            SOCKET_CORE_SO="$(dpkg -L lua-socket | grep -E '/lua/.*/socket/core\.so$' | head -n 1 || true)"
          fi
          if [ -z "$MIME_CORE_SO" ] && dpkg -s lua-socket >/dev/null 2>&1; then
            MIME_CORE_SO="$(dpkg -L lua-socket | grep -E '/lua/.*/mime/core\.so$' | head -n 1 || true)"
          fi

          if [ -z "$LPEG_SO" ] || [ -z "$SOCKET_CORE_SO" ] || [ -z "$MIME_CORE_SO" ]; then
            echo "Failed to resolve required Lua module shared objects." >&2
            echo "lpeg.so=$LPEG_SO" >&2
            echo "socket/core.so=$SOCKET_CORE_SO" >&2
            echo "mime/core.so=$MIME_CORE_SO" >&2
            [ -n "$LUA_BIN" ] && echo "lua.cpath=$("$LUA_BIN" -e 'io.write(package.cpath)' 2>/dev/null || true)" >&2
            exit 1
          fi

          QMUD_MODULE_ROOT="$(echo "$LPEG_SO" | sed -E 's#/lua/[^/]+/lpeg\.so$##')"
          if [ -z "$QMUD_MODULE_ROOT" ] || [ ! -d "$QMUD_MODULE_ROOT" ]; then
            echo "Failed to derive QMUD_SYSTEM_LUA_MODULES_PREFIX from $LPEG_SO" >&2
            exit 1
          fi

          echo "QMUD_SYSTEM_LUA_MODULES_PREFIX=$QMUD_MODULE_ROOT" >> "$GITHUB_ENV"
          echo "QMUD_SYSTEM_LPEG_SO=$LPEG_SO" >> "$GITHUB_ENV"
          echo "QMUD_SYSTEM_SOCKET_CORE_SO=$SOCKET_CORE_SO" >> "$GITHUB_ENV"
          echo "QMUD_SYSTEM_MIME_CORE_SO=$MIME_CORE_SO" >> "$GITHUB_ENV"

      - name: Install Qt 6.10.2
        run: |
          python3 -m pip install --upgrade pip setuptools wheel aqtinstall
          aqt install-qt -O "$RUNNER_TEMP/Qt" linux desktop 6.10.2 linux_gcc_64 -m qtmultimedia

          QT6_CMAKE_DIR="$(find "$RUNNER_TEMP/Qt" -type d -path '*/lib/cmake/Qt6' | sort | head -n 1)"
          if [ -z "$QT6_CMAKE_DIR" ]; then
            echo "Failed to locate Qt6 CMake package directory after aqt install." >&2
            exit 1
          fi

          QT_ROOT="$(cd "$QT6_CMAKE_DIR/../../.." && pwd)"
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "$QT_ROOT/bin" >> "$GITHUB_PATH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker executable for CMake targets
        run: |
          DOCKER_BIN="$(command -v docker || true)"
          if [ -z "$DOCKER_BIN" ]; then
            echo "docker executable not found on PATH." >&2
            exit 1
          fi
          echo "QMUD_DOCKER_EXECUTABLE=$DOCKER_BIN" >> "$GITHUB_ENV"
          docker --version

      - name: Build cached macOS cross image
        uses: docker/build-push-action@v6
        with:
          context: tools/docker/macos-qt610
          file: tools/docker/macos-qt610/Dockerfile
          tags: qmud-macos-builder:qt6.10
          load: true
          cache-from: type=gha,scope=qmud-macos-builder
          cache-to: type=gha,scope=qmud-macos-builder,mode=max

      - name: Build cached Windows cross image
        uses: docker/build-push-action@v6
        with:
          context: tools/docker/windows-qt610
          file: tools/docker/windows-qt610/Dockerfile
          tags: qmud-windows-builder:qt6.10
          load: true
          cache-from: type=gha,scope=qmud-windows-builder
          cache-to: type=gha,scope=qmud-windows-builder,mode=max

      - name: Configure CMake
        run: |
          cmake -S . -B cmake-build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DQMUD_CI_BUILD=${{ startsWith(github.ref, 'refs/tags/v') && 'OFF' || 'ON' }} \
            -DQMUD_APPIMAGE_VERSION="$QMUD_PACKAGE_VERSION" \
            -DQMUD_DOCKER_EXECUTABLE="$QMUD_DOCKER_EXECUTABLE" \
            -DQMUD_ENABLE_APPIMAGE=ON \
            -DQMUD_ENABLE_MAC_DOCKER=ON \
            -DQMUD_ENABLE_WINDOCKER=ON \
            -DQMUD_SYSTEM_LUA_MODULES_PREFIX="$QMUD_SYSTEM_LUA_MODULES_PREFIX" \
            -DQMUD_SYSTEM_LPEG_SO="$QMUD_SYSTEM_LPEG_SO" \
            -DQMUD_SYSTEM_SOCKET_CORE_SO="$QMUD_SYSTEM_SOCKET_CORE_SO" \
            -DQMUD_SYSTEM_MIME_CORE_SO="$QMUD_SYSTEM_MIME_CORE_SO"

      - name: Build AppImage
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target AppImage -j"$(nproc)"

      - name: Build macOS package
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target MacDocker

      - name: Build Windows package
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target WinDocker

      - name: Normalize packaged asset filenames
        run: |
          set -euo pipefail

          MAC_SRC="cmake-build-release/mac-docker-out/QMud.app.zip"
          MAC_DST="cmake-build-release/mac-docker-out/QMud-${QMUD_PACKAGE_VERSION}-macos.zip"
          WIN_SRC="cmake-build-release/windows-docker-out/QMud.zip"
          WIN_DST="cmake-build-release/windows-docker-out/QMud-${QMUD_PACKAGE_VERSION}-windows.zip"

          if [ ! -f "$MAC_SRC" ]; then
            echo "Missing macOS package: $MAC_SRC" >&2
            exit 1
          fi
          if [ ! -f "$WIN_SRC" ]; then
            echo "Missing Windows package: $WIN_SRC" >&2
            exit 1
          fi

          mv -f "$MAC_SRC" "$MAC_DST"
          mv -f "$WIN_SRC" "$WIN_DST"

          APPIMAGE_FILE="$(find cmake-build-release/appimage -maxdepth 1 -type f -name '*.AppImage' | sort | head -n 1)"
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "Missing AppImage package in cmake-build-release/appimage" >&2
            exit 1
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmud-appimage
          if-no-files-found: error
          path: |
            cmake-build-release/appimage/*.AppImage
            cmake-build-release/appimage/*.AppImage.zsync

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmud-macos
          if-no-files-found: error
          path: |
            cmake-build-release/mac-docker-out/QMud-*.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmud-windows
          if-no-files-found: error
          path: |
            cmake-build-release/windows-docker-out/QMud-*.zip

  publish-release:
    name: Publish GitHub release assets
    needs: build-packages
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qmud-*
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/qmud-appimage/*.AppImage
            release-assets/qmud-appimage/*.AppImage.zsync
            release-assets/qmud-macos/*.zip
            release-assets/qmud-windows/*.zip

  publish-ci-release:
    name: Publish rolling CI prerelease
    needs: build-packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base version from Version.h
        id: version
        run: |
          VERSION_LINE="$(grep -F -m1 'kVersionString[]' src/Version.h || true)"
          BASE_VERSION="${VERSION_LINE#*\"}"
          BASE_VERSION="${BASE_VERSION%%\"*}"
          if [ -z "$BASE_VERSION" ]; then
            echo "Failed to resolve kVersionString from src/Version.h" >&2
            exit 1
          fi
          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qmud-*
          path: release-assets

      - name: Move rolling CI tag to current commit
        run: |
          CI_TAG="ci-${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${CI_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${CI_TAG}" --force

      - name: Publish CI prerelease assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.ref_name }}
          name: QMud v${{ steps.version.outputs.base }}-ci
          prerelease: true
          make_latest: false
          generate_release_notes: false
          overwrite_files: true
          files: |
            release-assets/qmud-appimage/*.AppImage
            release-assets/qmud-appimage/*.AppImage.zsync
            release-assets/qmud-macos/*.zip
            release-assets/qmud-windows/*.zip
